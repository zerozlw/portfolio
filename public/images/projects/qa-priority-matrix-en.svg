<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="18" font-weight="600" fill="#111">QA Issue Priority Matrix</text>
  <text x="400" y="60" text-anchor="middle" font-size="12" fill="#888">Expert Walkthrough Findings</text>

  <!-- Axes -->
  <line x1="100" y1="500" x2="740" y2="500" stroke="#ccc" stroke-width="1.5"/>
  <line x1="100" y1="500" x2="100" y2="90" stroke="#ccc" stroke-width="1.5"/>

  <!-- Axis arrows -->
  <polygon points="740,500 732,496 732,504" fill="#ccc"/>
  <polygon points="100,90 96,98 104,98" fill="#ccc"/>

  <!-- Axis labels -->
  <text x="420" y="540" text-anchor="middle" font-size="13" fill="#555">Implementation Effort →</text>
  <text x="420" y="558" text-anchor="middle" font-size="11" fill="#999">实现成本</text>

  <text x="45" y="300" text-anchor="middle" font-size="13" fill="#555" transform="rotate(-90, 45, 300)">User Impact →</text>
  <text x="65" y="300" text-anchor="middle" font-size="11" fill="#999" transform="rotate(-90, 65, 300)">用户影响</text>

  <!-- Quadrant labels -->
  <text x="260" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#e74c3c">P0 Critical</text>
  <text x="260" y="138" text-anchor="middle" font-size="10" fill="#e74c3c">High Impact · Low Effort</text>

  <text x="580" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#e67e22">P0 Important</text>
  <text x="580" y="138" text-anchor="middle" font-size="10" fill="#e67e22">High Impact · High Effort</text>

  <text x="260" y="470" text-anchor="middle" font-size="13" font-weight="600" fill="#27ae60">P1 Quick Wins</text>
  <text x="260" y="488" text-anchor="middle" font-size="10" fill="#27ae60">Low Impact · Low Effort</text>

  <text x="580" y="470" text-anchor="middle" font-size="13" font-weight="600" fill="#3498db">P1 Backlog</text>
  <text x="580" y="488" text-anchor="middle" font-size="10" fill="#3498db">Low Impact · High Effort</text>

  <!-- Quadrant divider lines -->
  <line x1="420" y1="90" x2="420" y2="500" stroke="#ddd" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="100" y1="300" x2="740" y2="300" stroke="#ddd" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- P0 Critical (high impact, low effort) -->
  <circle cx="200" cy="170" r="32" fill="#c0392b" opacity="0.9"/>
  <text x="200" y="166" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Popup</text>
  <text x="200" y="180" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Interference</text>
  <text x="200" y="215" text-anchor="middle" font-size="9" fill="#c0392b">Appears at wrong time</text>

  <circle cx="280" cy="220" r="28" fill="#c0392b" opacity="0.85"/>
  <text x="280" y="216" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Simplify</text>
  <text x="280" y="230" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Close Flow</text>
  <text x="280" y="262" text-anchor="middle" font-size="9" fill="#c0392b">3 options → 1 click</text>

  <circle cx="170" cy="260" r="26" fill="#c0392b" opacity="0.8"/>
  <text x="170" y="256" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Do Not</text>
  <text x="170" y="270" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Disturb</text>
  <text x="170" y="300" text-anchor="middle" font-size="9" fill="#c0392b">Shortcut to recall QA</text>

  <!-- P0 Important (high impact, high effort) -->
  <circle cx="500" cy="180" r="30" fill="#d35400" opacity="0.85"/>
  <text x="500" y="176" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Reduce</text>
  <text x="500" y="190" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Cognitive Load</text>
  <text x="500" y="222" text-anchor="middle" font-size="9" fill="#d35400">QC hints / instruction taxonomy</text>

  <circle cx="580" cy="240" r="24" fill="#d35400" opacity="0.75"/>
  <text x="580" y="236" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">QA Label</text>
  <text x="580" y="250" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Accuracy</text>
  <text x="580" y="276" text-anchor="middle" font-size="9" fill="#d35400">"voice" misread as audio</text>

  <circle cx="470" cy="260" r="27" fill="#d35400" opacity="0.8"/>
  <text x="470" y="256" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Split</text>
  <text x="470" y="270" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">QA / QC</text>
  <text x="470" y="300" text-anchor="middle" font-size="9" fill="#d35400">Edit vs browse contexts</text>

  <!-- P1 Quick Wins (low impact, low effort) -->
  <circle cx="220" cy="380" r="22" fill="#27ae60" opacity="0.75"/>
  <text x="220" y="376" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Icon</text>
  <text x="220" y="390" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Consistency</text>

  <circle cx="310" cy="400" r="20" fill="#27ae60" opacity="0.65"/>
  <text x="310" y="396" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Interaction</text>
  <text x="310" y="410" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Consistency</text>

  <circle cx="190" cy="430" r="21" fill="#27ae60" opacity="0.7"/>
  <text x="190" y="426" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Info</text>
  <text x="190" y="440" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Design</text>

  <!-- P1 Backlog (low impact, high effort) -->
  <circle cx="560" cy="380" r="22" fill="#3498db" opacity="0.7"/>
  <text x="560" y="376" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Dialogue</text>
  <text x="560" y="390" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Mechanism</text>

  <circle cx="640" cy="410" r="20" fill="#3498db" opacity="0.6"/>
  <text x="640" y="406" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Reply</text>
  <text x="640" y="420" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Flow</text>

  <circle cx="500" cy="420" r="19" fill="#3498db" opacity="0.55"/>
  <text x="500" y="416" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">In-App</text>
  <text x="500" y="430" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">QA Translate</text>

  <!-- Legend -->
  <rect x="620" y="555" width="12" height="12" rx="2" fill="#c0392b" opacity="0.9"/>
  <text x="638" y="566" font-size="10" fill="#555">P0 Critical (do now)</text>

  <rect x="620" y="575" width="12" height="12" rx="2" fill="#d35400" opacity="0.8"/>
  <text x="638" y="586" font-size="10" fill="#555">P0 Important (schedule)</text>
</svg>
