<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-size="18" font-weight="600" fill="#111">QA 问题优先级矩阵</text>
  <text x="400" y="60" text-anchor="middle" font-size="12" fill="#888">Expert Walkthrough Priority Matrix</text>

  <!-- Axes -->
  <line x1="100" y1="500" x2="740" y2="500" stroke="#ccc" stroke-width="1.5"/>
  <line x1="100" y1="500" x2="100" y2="90" stroke="#ccc" stroke-width="1.5"/>

  <!-- Axis arrows -->
  <polygon points="740,500 732,496 732,504" fill="#ccc"/>
  <polygon points="100,90 96,98 104,98" fill="#ccc"/>

  <!-- Axis labels -->
  <text x="420" y="540" text-anchor="middle" font-size="13" fill="#555">Implementation Effort →</text>
  <text x="420" y="558" text-anchor="middle" font-size="11" fill="#999">实现成本</text>

  <text x="45" y="300" text-anchor="middle" font-size="13" fill="#555" transform="rotate(-90, 45, 300)">User Impact →</text>
  <text x="65" y="300" text-anchor="middle" font-size="11" fill="#999" transform="rotate(-90, 65, 300)">用户影响</text>

  <!-- Quadrant labels -->
  <text x="260" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#e74c3c">P0 核心</text>
  <text x="260" y="138" text-anchor="middle" font-size="10" fill="#e74c3c">高影响 · 低成本</text>

  <text x="580" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#e67e22">P0 重要</text>
  <text x="580" y="138" text-anchor="middle" font-size="10" fill="#e67e22">高影响 · 高成本</text>

  <text x="260" y="470" text-anchor="middle" font-size="13" font-weight="600" fill="#27ae60">P1 优化</text>
  <text x="260" y="488" text-anchor="middle" font-size="10" fill="#27ae60">低影响 · 低成本</text>

  <text x="580" y="470" text-anchor="middle" font-size="13" font-weight="600" fill="#3498db">P1 储备</text>
  <text x="580" y="488" text-anchor="middle" font-size="10" fill="#3498db">低影响 · 高成本</text>

  <!-- Quadrant divider lines -->
  <line x1="420" y1="90" x2="420" y2="500" stroke="#ddd" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="100" y1="300" x2="740" y2="300" stroke="#ddd" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- P0 核心 (高影响, 低成本) - 最深色 -->
  <!-- Pops-up 干扰 -->
  <circle cx="200" cy="170" r="32" fill="#c0392b" opacity="0.9"/>
  <text x="200" y="166" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Pops-up</text>
  <text x="200" y="180" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">干扰</text>
  <text x="200" y="215" text-anchor="middle" font-size="9" fill="#c0392b">出现时机不合时宜</text>

  <!-- 关闭逻辑简化 -->
  <circle cx="280" cy="220" r="28" fill="#c0392b" opacity="0.85"/>
  <text x="280" y="216" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">关闭逻辑</text>
  <text x="280" y="230" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">简化</text>
  <text x="280" y="262" text-anchor="middle" font-size="9" fill="#c0392b">三选一→一键关闭</text>

  <!-- QA免打扰 -->
  <circle cx="170" cy="260" r="26" fill="#c0392b" opacity="0.8"/>
  <text x="170" y="256" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">QA</text>
  <text x="170" y="270" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">免打扰</text>
  <text x="170" y="300" text-anchor="middle" font-size="9" fill="#c0392b">快捷键随时唤起</text>

  <!-- P0 重要 (高影响, 高成本) - 次深色 -->
  <!-- 认知负担 -->
  <circle cx="500" cy="180" r="30" fill="#d35400" opacity="0.85"/>
  <text x="500" y="176" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">认知负担</text>
  <text x="500" y="190" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">降低</text>
  <text x="500" y="222" text-anchor="middle" font-size="9" fill="#d35400">QC提示文案/指令分类</text>

  <!-- QA文案准确性 -->
  <circle cx="580" cy="240" r="24" fill="#d35400" opacity="0.75"/>
  <text x="580" y="236" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">QA文案</text>
  <text x="580" y="250" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">准确性</text>
  <text x="580" y="276" text-anchor="middle" font-size="9" fill="#d35400">voice→语音歧义</text>

  <!-- QA/QC拆分 -->
  <circle cx="470" cy="260" r="27" fill="#d35400" opacity="0.8"/>
  <text x="470" y="256" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">QA/QC</text>
  <text x="470" y="270" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">拆分</text>
  <text x="470" y="300" text-anchor="middle" font-size="9" fill="#d35400">编辑/浏览场景分离</text>

  <!-- P1 优化 (低影响, 低成本) - 较浅色 -->
  <!-- 图标一致性 -->
  <circle cx="220" cy="380" r="22" fill="#27ae60" opacity="0.75"/>
  <text x="220" y="376" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">图标</text>
  <text x="220" y="390" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">一致性</text>

  <!-- 交互一致性 -->
  <circle cx="310" cy="400" r="20" fill="#27ae60" opacity="0.65"/>
  <text x="310" y="396" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">交互</text>
  <text x="310" y="410" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">一致性</text>

  <!-- 信息设计 -->
  <circle cx="190" cy="430" r="21" fill="#27ae60" opacity="0.7"/>
  <text x="190" y="426" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">信息</text>
  <text x="190" y="440" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">设计</text>

  <!-- P1 储备 (低影响, 高成本) - 最浅色 -->
  <!-- 对话机制 -->
  <circle cx="560" cy="380" r="22" fill="#3498db" opacity="0.7"/>
  <text x="560" y="376" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">对话机制</text>
  <text x="560" y="390" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">优化</text>

  <!-- Reply前置 -->
  <circle cx="640" cy="410" r="20" fill="#3498db" opacity="0.6"/>
  <text x="640" y="406" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Reply</text>
  <text x="640" y="420" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">前置</text>

  <!-- 应用内翻译 -->
  <circle cx="500" cy="420" r="19" fill="#3498db" opacity="0.55"/>
  <text x="500" y="416" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">应用内</text>
  <text x="500" y="430" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">QA翻译</text>

  <!-- Legend -->
  <rect x="620" y="555" width="12" height="12" rx="2" fill="#c0392b" opacity="0.9"/>
  <text x="638" y="566" font-size="10" fill="#555">P0 核心 (立即做)</text>

  <rect x="620" y="575" width="12" height="12" rx="2" fill="#d35400" opacity="0.8"/>
  <text x="638" y="586" font-size="10" fill="#555">P0 重要 (排期做)</text>
</svg>
