<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" fill="none" font-family="Inter,system-ui,sans-serif">
  <text x="350" y="22" text-anchor="middle" font-size="10" fill="#999">Research Process: Two tracks running in parallel</text>

  <!-- Track 1: Email Feedback -->
  <rect x="20" y="35" width="310" height="170" rx="8" fill="#f5f5f5" stroke="#eaeaea"/>
  <text x="175" y="55" text-anchor="middle" font-size="10" font-weight="500" fill="#555">Daily Email Feedback</text>

  <rect x="35" y="65" width="280" height="18" rx="4" fill="#fff" stroke="#eaeaea"/>
  <text x="175" y="78" text-anchor="middle" font-size="8" fill="#999">Collect user feedback from inbox daily</text>

  <rect x="35" y="90" width="280" height="18" rx="4" fill="#fff" stroke="#eaeaea"/>
  <text x="175" y="103" text-anchor="middle" font-size="8" fill="#999">Reply & follow up with users</text>

  <rect x="35" y="115" width="280" height="18" rx="4" fill="#fff" stroke="#eaeaea"/>
  <text x="175" y="128" text-anchor="middle" font-size="8" fill="#999">Identify recurring patterns</text>

  <rect x="35" y="145" width="280" height="18" rx="4" fill="#ede9fe" stroke="#a78bfa"/>
  <text x="175" y="158" text-anchor="middle" font-size="8" fill="#7c3aed">If issue repeats → prioritize</text>

  <rect x="35" y="172" width="280" height="24" rx="4" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="175" y="188" text-anchor="middle" font-size="8" fill="#16a34a">→ Requirement Evaluation</text>

  <!-- Track 2: Overseas Surveys -->
  <rect x="370" y="35" width="310" height="170" rx="8" fill="#f5f5f5" stroke="#eaeaea"/>
  <text x="525" y="55" text-anchor="middle" font-size="10" font-weight="500" fill="#555">Overseas User Interviews</text>

  <rect x="385" y="65" width="280" height="18" rx="4" fill="#fff" stroke="#eaeaea"/>
  <text x="525" y="78" text-anchor="middle" font-size="8" fill="#999">Semi-structured interviews with high-freq users</text>

  <rect x="385" y="90" width="280" height="18" rx="4" fill="#fff" stroke="#eaeaea"/>
  <text x="525" y="103" text-anchor="middle" font-size="8" fill="#999">Across different countries & regions</text>

  <rect x="385" y="115" width="280" height="18" rx="4" fill="#fff" stroke="#eaeaea"/>
  <text x="525" y="128" text-anchor="middle" font-size="8" fill="#999">Confirm paid vs free user motivations</text>

  <rect x="385" y="145" width="280" height="18" rx="4" fill="#ede9fe" stroke="#a78bfa"/>
  <text x="525" y="158" text-anchor="middle" font-size="8" fill="#7c3aed">Cross-validate with email feedback</text>

  <rect x="385" y="172" width="280" height="24" rx="4" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="525" y="188" text-anchor="middle" font-size="8" fill="#16a34a">→ Insight Extraction</text>

  <!-- Bottom: Decision -->
  <rect x="150" y="200" width="400" height="18" rx="4" fill="#f5f5f5" stroke="#a78bfa"/>
  <text x="350" y="213" text-anchor="middle" font-size="8" fill="#7c3aed">Cross-validated insights → Feature prioritization → Competitive analysis → Design → Measure</text>
</svg>
