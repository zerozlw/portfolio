<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" fill="none" font-family="PingFang SC,Inter,system-ui,sans-serif">
  <text x="350" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#111">IDP-Debug Skill — 问题处理流程</text>

  <rect x="250" y="50" width="200" height="44" rx="8" fill="#f5f5f5" stroke="#eaeaea"/>
  <text x="350" y="76" text-anchor="middle" font-size="11" fill="#555">用户上报问题</text>
  <text x="350" y="89" text-anchor="middle" font-size="9" fill="#999">Bug / 数据异常 / 按钮消失</text>
  <line x1="350" y1="94" x2="350" y2="114" stroke="#d0d0d0" stroke-width="1"/>

  <rect x="215" y="114" width="270" height="44" rx="8" fill="#f5f5f5" stroke="#eaeaea"/>
  <text x="350" y="134" text-anchor="middle" font-size="11" font-weight="500" fill="#111">Step 1 — 收集关键信息</text>
  <text x="350" y="148" text-anchor="middle" font-size="9" fill="#555">页面 URL · 用户角色 · 错误截图 · 复现步骤</text>
  <line x1="350" y1="158" x2="350" y2="178" stroke="#d0d0d0" stroke-width="1"/>

  <rect x="250" y="178" width="200" height="40" rx="8" fill="#f5f5f5" stroke="#eaeaea"/>
  <text x="350" y="202" text-anchor="middle" font-size="11" font-weight="500" fill="#111">Step 2 — 问题分类</text>
  <line x1="350" y1="218" x2="350" y2="238" stroke="#d0d0d0" stroke-width="1"/>

  <rect x="30" y="238" width="170" height="50" rx="8" fill="#f5f5f5" stroke="#eaeaea"/>
  <text x="115" y="258" text-anchor="middle" font-size="10" font-weight="500" fill="#111">Step 3a — 前端排查</text>
  <text x="115" y="272" text-anchor="middle" font-size="8.5" fill="#555">组件 · 权限 · 路由</text>

  <rect x="265" y="238" width="170" height="50" rx="8" fill="#f5f5f5" stroke="#eaeaea"/>
  <text x="350" y="258" text-anchor="middle" font-size="10" font-weight="500" fill="#111">Step 3b — 后端排查</text>
  <text x="350" y="272" text-anchor="middle" font-size="8.5" fill="#555">接口 · 逻辑 · BPM 流程</text>

  <rect x="500" y="238" width="170" height="50" rx="8" fill="#f5f5f5" stroke="#eaeaea"/>
  <text x="585" y="258" text-anchor="middle" font-size="10" font-weight="500" fill="#111">Step 3c — 数据层排查</text>
  <text x="585" y="272" text-anchor="middle" font-size="8.5" fill="#555">数据库记录 · 同步状态</text>

  <line x1="310" y1="218" x2="115" y2="238" stroke="#d0d0d0" stroke-width="1"/>
  <line x1="350" y1="218" x2="350" y2="238" stroke="#d0d0d0" stroke-width="1"/>
  <line x1="390" y1="218" x2="585" y2="238" stroke="#d0d0d0" stroke-width="1"/>

  <line x1="115" y1="288" x2="115" y2="308" stroke="#d0d0d0" stroke-width="1"/>
  <line x1="350" y1="288" x2="350" y2="308" stroke="#d0d0d0" stroke-width="1"/>
  <line x1="585" y1="288" x2="585" y2="308" stroke="#d0d0d0" stroke-width="1"/>

  <rect x="230" y="308" width="240" height="44" rx="8" fill="#f5f5f5" stroke="#eaeaea"/>
  <text x="350" y="328" text-anchor="middle" font-size="11" font-weight="500" fill="#111">Step 4 — 定位根因</text>
  <text x="350" y="342" text-anchor="middle" font-size="9" fill="#555">跨层追踪 · 精确定位问题点</text>
  <line x1="350" y1="352" x2="350" y2="372" stroke="#d0d0d0" stroke-width="1"/>

  <rect x="230" y="372" width="240" height="44" rx="8" fill="#f5f5f5" stroke="#eaeaea"/>
  <text x="350" y="392" text-anchor="middle" font-size="11" font-weight="500" fill="#111">Step 5 — 给出解决方案</text>
  <text x="350" y="406" text-anchor="middle" font-size="9" fill="#555">修复建议 · 手册链接 · 升级处理</text>

  <rect x="250" y="424" width="200" height="14" rx="4" fill="#e8e8e8"/>
  <text x="350" y="434" text-anchor="middle" font-size="8" fill="#888">Step 6 — 反馈闭环 · 持续学习</text>
</svg>
