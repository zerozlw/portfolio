<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" fill="none" font-family="Inter,system-ui,sans-serif">
  <text x="350" y="28" text-anchor="middle" font-size="12" font-weight="600" fill="#111">From Offline to Online</text>

  <!-- Before: Offline -->
  <text x="175" y="60" text-anchor="middle" font-size="10" fill="#999">Before — Offline</text>

  <rect x="50" y="75" width="250" height="80" rx="8" fill="#f5f5f5" stroke="#eaeaea"/>
  <text x="175" y="98" text-anchor="middle" font-size="11" font-weight="500" fill="#555">Excel + Manual Cross-check</text>
  <text x="175" y="115" text-anchor="middle" font-size="9" fill="#999">Engineering → Test → Sample Car</text>
  <text x="175" y="132" text-anchor="middle" font-size="9" fill="#999">Each step requires human handoff</text>

  <rect x="320" y="75" width="250" height="80" rx="8" fill="#fff5f5" stroke="#fecaca"/>
  <text x="445" y="98" text-anchor="middle" font-size="11" font-weight="500" fill="#e74c3c">Risks</text>
  <text x="445" y="115" text-anchor="middle" font-size="9" fill="#999">Information gaps</text>
  <text x="445" y="130" text-anchor="middle" font-size="9" fill="#999">Project-level failures</text>
  <text x="445" y="145" text-anchor="middle" font-size="9" fill="#999">Millions in losses</text>

  <!-- Arrow down -->
  <line x1="350" y1="165" x2="350" y2="185" stroke="#d0d0d0" stroke-width="1"/>
  <polygon points="347,185 353,185 350,190" fill="#d0d0d0"/>

  <!-- After: Online -->
  <text x="175" y="218" text-anchor="middle" font-size="10" fill="#999">After — Online Platform</text>

  <rect x="50" y="228" width="250" height="60" rx="8" fill="#f5f5f5" stroke="#a78bfa"/>
  <text x="175" y="255" text-anchor="middle" font-size="11" font-weight="500" fill="#555">Integrated Platform</text>
  <text x="175" y="270" text-anchor="middle" font-size="9" fill="#999">Data flows automatically</text>

  <rect x="320" y="228" width="250" height="60" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="445" y="255" text-anchor="middle" font-size="11" font-weight="500" fill="#16a34a">Results</text>
  <text x="445" y="270" text-anchor="middle" font-size="9" fill="#999">Seconds · 500+ users · All programs</text>
</svg>
