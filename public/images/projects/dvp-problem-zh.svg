<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" fill="none" font-family="PingFang SC,Inter,system-ui,sans-serif">
  <text x="350" y="28" text-anchor="middle" font-size="12" font-weight="600" fill="#111">从线下到线上</text>

  <!-- Before -->
  <text x="175" y="60" text-anchor="middle" font-size="10" fill="#999">现状 — 线下</text>

  <rect x="50" y="75" width="250" height="80" rx="8" fill="#f5f5f5" stroke="#eaeaea"/>
  <text x="175" y="98" text-anchor="middle" font-size="11" font-weight="500" fill="#555">Excel + 人工校对</text>
  <text x="175" y="115" text-anchor="middle" font-size="9" fill="#999">工程变更 → 试验任务 → 样车状态</text>
  <text x="175" y="132" text-anchor="middle" font-size="9" fill="#999">每个环节都需要人工传递</text>

  <rect x="320" y="75" width="250" height="80" rx="8" fill="#fff5f5" stroke="#fecaca"/>
  <text x="445" y="98" text-anchor="middle" font-size="11" font-weight="500" fill="#e74c3c">风险</text>
  <text x="445" y="115" text-anchor="middle" font-size="9" fill="#999">信息传递断裂</text>
  <text x="445" y="130" text-anchor="middle" font-size="9" fill="#999">项目级失误</text>
  <text x="445" y="145" text-anchor="middle" font-size="9" fill="#999">百万级经济损失</text>

  <!-- Arrow -->
  <line x1="350" y1="165" x2="350" y2="185" stroke="#d0d0d0" stroke-width="1"/>
  <polygon points="347,185 353,185 350,190" fill="#d0d0d0"/>

  <!-- After -->
  <text x="175" y="218" text-anchor="middle" font-size="10" fill="#999">目标 — 线上平台</text>

  <rect x="50" y="228" width="250" height="60" rx="8" fill="#f5f5f5" stroke="#a78bfa"/>
  <text x="175" y="255" text-anchor="middle" font-size="11" font-weight="500" fill="#555">一体化平台</text>
  <text x="175" y="270" text-anchor="middle" font-size="9" fill="#999">数据自动流转</text>

  <rect x="320" y="228" width="250" height="60" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="445" y="255" text-anchor="middle" font-size="11" font-weight="500" fill="#16a34a">效果</text>
  <text x="445" y="270" text-anchor="middle" font-size="9" fill="#999">秒级响应 · 500+ 用户 · 全项目覆盖</text>
</svg>
