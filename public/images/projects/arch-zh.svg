<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" fill="none" font-family="PingFang SC,Inter,system-ui,sans-serif">
  <!-- Layer 1: 用户入口 -->
  <rect x="20" y="10" width="760" height="65" rx="8" fill="#f5f5f5" stroke="#eaeaea"/>
