<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" fill="none" font-family="PingFang SC,Inter,system-ui,sans-serif">
  <text x="350" y="22" text-anchor="middle" font-size="10" fill="#999">调研流程：两条调研线并行推进</text>

  <!-- Track 1: 邮箱反馈 -->
  <rect x="20" y="35" width="310" height="170" rx="8" fill="#f5f5f5" stroke="#eaeaea"/>
  <text x="175" y="55" text-anchor="middle" font-size="10" font-weight="500" fill="#555">每日邮箱反馈</text>

  <rect x="35" y="65" width="280" height="18" rx="4" fill="#fff" stroke="#eaeaea"/>
  <text x="175" y="78" text-anchor="middle" font-size="8" fill="#999">每日定时挖掘有价值的邮箱反馈</text>

  <rect x="35" y="90" width="280" height="18" rx="4" fill="#fff" stroke="#eaeaea"/>
  <text x="175" y="103" text-anchor="middle" font-size="8" fill="#999">给予反馈并追问用户</text>

  <rect x="35" y="115" width="280" height="18" rx="4" fill="#fff" stroke="#eaeaea"/>
  <text x="175" y="128" text-anchor="middle" font-size="8" fill="#999">识别反复出现的问题模式</text>

  <rect x="35" y="145" width="280" height="18" rx="4" fill="#ede9fe" stroke="#a78bfa"/>
  <text x="175" y="158" text-anchor="middle" font-size="8" fill="#7c3aed">问题提问多了 → 优先级提升</text>

  <rect x="35" y="172" width="280" height="24" rx="4" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="175" y="188" text-anchor="middle" font-size="8" fill="#16a34a">→ 需求评估</text>

  <!-- Track 2: 海外调研 -->
  <rect x="370" y="35" width="310" height="170" rx="8" fill="#f5f5f5" stroke="#eaeaea"/>
  <text x="525" y="55" text-anchor="middle" font-size="10" font-weight="500" fill="#555">海外用户访谈</text>

  <rect x="385" y="65" width="280" height="18" rx="4" fill="#fff" stroke="#eaeaea"/>
  <text x="525" y="78" text-anchor="middle" font-size="8" fill="#999">抽取高频用户进行半结构化访谈</text>

  <rect x="385" y="90" width="280" height="18" rx="4" fill="#fff" stroke="#eaeaea"/>
  <text x="525" y="103" text-anchor="middle" font-size="8" fill="#999">覆盖不同国家和地区的海外用户</text>

  <rect x="385" y="115" width="280" height="18" rx="4" fill="#fff" stroke="#eaeaea"/>
  <text x="525" y="128" text-anchor="middle" font-size="8" fill="#999">确认付费/免费用户的使用动机和痛点</text>

  <rect x="385" y="145" width="280" height="18" rx="4" fill="#ede9fe" stroke="#a78bfa"/>
  <text x="525" y="158" text-anchor="middle" font-size="8" fill="#7c3aed">与邮箱反馈交叉验证</text>

  <rect x="385" y="172" width="280" height="24" rx="4" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="525" y="188" text-anchor="middle" font-size="8" fill="#16a34a">→ 洞察提取</text>

  <!-- Bottom: Decision -->
  <rect x="150" y="200" width="400" height="18" rx="4" fill="#f5f5f5" stroke="#a78bfa"/>
  <text x="350" y="213" text-anchor="middle" font-size="8" fill="#7c3aed">交叉验证 → 功能优先级 → 竞品分析 → 设计方案 → 数据验证闭环</text>
</svg>
