<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <style>
    text { font-family: Inter, system-ui, sans-serif; }
    .title { font-size: 11px; font-weight: 600; fill: #111; }
    .label { font-size: 10px; fill: #555; }
    .box { rx: 8; ry: 8; }
  </style>

  <!-- Layer 1: User Entry -->
  <rect x="20" y="20" width="760" height="70" class="box" fill="#f5f5f5" stroke="#eaeaea"/>
  <text x="40" y="42" class="title">User Entry</text>
  <rect x="40" y="50" width="100" height="28" rx="6" fill="#fff" stroke="#eaeaea"/>
  <text x="90" y="68" text-anchor="middle" class="label">Private Chat</text>
  <rect x="155" y="50" width="100" height="28" rx="6" fill="#fff" stroke="#eaeaea"/>
  <text x="205" y="68" text-anchor="middle" class="label">Group @</text>
  <rect x="270" y="50" width="100" height="28" rx="6" fill="#fff" stroke="#eaeaea"/>
